name: CI — Backend & Frontend

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import check
        run: python -c "from app.main import app; print('Import OK')"

      - name: Start server & test API
        run: |
          uvicorn app.main:app --port 8000 &
          sleep 3

          # Health check
          curl -sf http://localhost:8000/todos | python -c "import sys,json; json.load(sys.stdin); print('GET /todos OK')"

          # Create
          RESP=$(curl -sf -X POST http://localhost:8000/todos \
            -H "Content-Type: application/json" \
            -d '{"title":"CI Test","completed":false}')
          echo "$RESP" | python -c "import sys,json; d=json.load(sys.stdin); assert d['title']=='CI Test'; print('POST /todos OK')"

          # Read
          ID=$(echo "$RESP" | python -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -sf "http://localhost:8000/todos/$ID" | python -c "import sys,json; json.load(sys.stdin); print('GET /todos/$ID OK')"

          # Update
          curl -sf -X PUT "http://localhost:8000/todos/$ID" \
            -H "Content-Type: application/json" \
            -d '{"completed":true}' | python -c "import sys,json; d=json.load(sys.stdin); assert d['completed']==True; print('PUT OK')"

          # Delete
          curl -sf -X DELETE "http://localhost:8000/todos/$ID"
          echo "DELETE OK"

          kill %1

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
