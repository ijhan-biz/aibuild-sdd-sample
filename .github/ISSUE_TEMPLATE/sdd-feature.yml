name: "🚀 SDD Feature Request"
description: "스펙킷(Spec Kit) 양식에 따른 기능 요청. Copilot Workspace가 이 양식을 기반으로 Plan/Tasks를 생성합니다."
title: "[Feature]: "
labels: ["enhancement", "sdd"]
body:
  - type: markdown
    attributes:
      value: |
        ## 📋 SDD Feature Request
        아래 양식을 **빠짐없이** 작성해 주세요. 이 이슈는 Copilot Workspace의 입력으로 사용됩니다.

  - type: textarea
    id: summary
    attributes:
      label: 기능 요약 (Feature Summary)
      description: 요청하는 기능을 한두 문장으로 요약하세요.
      placeholder: "예: Todo 항목에 마감일(due_date)과 우선순위(priority) 필드를 추가합니다."
    validations:
      required: true

  - type: textarea
    id: user-story
    attributes:
      label: 사용자 스토리 (User Story)
      description: |
        "As a [역할], I want [기능], so that [가치]" 형식으로 작성하세요.
      placeholder: |
        As a 사용자,
        I want Todo에 마감일과 우선순위를 설정할 수 있기를,
        so that 할 일의 긴급도를 파악하고 효율적으로 관리할 수 있다.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 수용 기준 (Acceptance Criteria)
      description: 이 기능이 완료되었다고 판단할 수 있는 구체적인 조건을 체크리스트로 작성하세요.
      placeholder: |
        - [ ] POST /todos 요청 시 due_date(ISO 8601)와 priority(low/medium/high) 필드를 선택적으로 전달할 수 있다.
        - [ ] GET /todos 응답에 due_date, priority 필드가 포함된다.
        - [ ] 기존 필드(title, completed)만으로도 Todo 생성이 가능하다 (하위 호환).
        - [ ] Swagger UI(/docs)에서 새 필드가 정상적으로 표시된다.
    validations:
      required: true

  - type: textarea
    id: technical-constraints
    attributes:
      label: 기술적 제약조건 (Technical Constraints)
      description: 구현 시 반드시 지켜야 할 기술적 제약사항을 명시하세요.
      placeholder: |
        - 기존 API의 하위 호환성(backward compatibility)을 유지해야 합니다.
        - Pydantic v2 모델을 사용합니다.
        - 인메모리 저장소 구조를 유지합니다 (DB 도입 없음).
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 영향 범위 (Scope)
      description: 이 기능으로 인해 변경이 예상되는 파일/모듈을 나열하세요.
      placeholder: |
        - app/models/todo.py — Pydantic 모델에 새 필드 추가
        - app/data/store.py — 저장소에 새 필드 반영
        - app/services/todo.py — 서비스 로직 업데이트
        - app/routers/todo.py — 라우트 변경 (있다면)
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 추가 컨텍스트 (Additional Context)
      description: 참고할 디자인, 스크린샷, 외부 문서 링크 등이 있으면 첨부하세요.
    validations:
      required: false
