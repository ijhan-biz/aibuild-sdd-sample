# 자동 릴리스 노트 카테고리 설정
# PR 라벨 기반으로 릴리스 노트가 자동 분류됩니다.
# https://docs.github.com/en/repositories/releasing-on-github/automatically-generated-release-notes

changelog:
  categories:
    - title: "🚀 New Features"
      labels:
        - enhancement
        - sdd
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "📝 Documentation"
      labels:
        - documentation
    - title: "🔧 Maintenance"
      labels:
        - chore
        - dependencies
    - title: "Other Changes"
      labels:
        - "*"
